services:
  postgres:
    image: postgres:16-alpine
    container_name: idol-postgres
    environment:
      POSTGRES_USER: idol
      POSTGRES_PASSWORD: idol_secret
      POSTGRES_DB: idol_championship
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: idol-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
